<div class="products-page container py-4">

  <div class="page-header mb-4">
    <p class="page-eyebrow mb-2">Catalog</p>
    <h2 class="page-title mb-2">Products</h2>
    <p class="page-subtitle mb-0">
      Browse our collection and add your favorite items to the cart.
    </p>
  </div>

  @if (products$ | async; as products) {

    @if (products.length === 0) {
      <div class="empty-state">
        No products available.
      </div>
    } @else {
      <div class="row g-4">

        @for (product of products; track product.id) {
          <div class="col-12 col-sm-6 col-lg-3">

            <div class="card product-card h-100 border-0">

              <div class="image-wrapper">
                <img
                  [src]="product.imageUrl"
                  class="product-image"
                  [alt]="product.name"
                />
              </div>

              <div class="card-body d-flex flex-column">
                <h5 class="card-title">
                  {{ product.name }}
                </h5>

                <p class="product-price">
                  {{ product.price | currency }}
                </p>

                <button
                  class="btn add-to-cart-btn w-100 mt-auto"
                  (click)="addToCart(product)">
                  Add to Cart
                </button>
              </div>

            </div>

          </div>
        }

      </div>
    }

  }

</div>
